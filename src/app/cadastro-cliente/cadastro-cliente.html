<div class="tela">
  <div class="container">

   
    <div class="direita">
      <div class="form-group">
        <h1>SEJA BEM-VINDO, CLIENTE</h1>

        <label>Nome Completo:</label>
        <input type="text" placeholder="Seu nome completo">

        <label>Email:</label>
        <input type="email" placeholder="Seu email">

        <label>Senha:</label>
        <input type="password" placeholder="Sua senha">

        <label>Confirmar Senha:</label>
        <input type="password" placeholder="Confirme sua senha">

        <label>Telefone:</label>
        <input type="text" placeholder="Seu telefone">

        <label>CPF:</label>
        <input type="text" placeholder="Seu CPF">

        <label class="checkbox-linha">
          <input type="checkbox" [(ngModel)]="possuiCondicaoEspecial">
          Possui alguma condição especial? (Ex: Idade avançada, mobilidade reduzida, etc.)
        </label>

        @if(possuiCondicaoEspecial){
          <input type="text" placeholder="Descreva sua condição">
        }

        <div class="separador"></div>

        <button type="submit" class="btn-primary">CADASTRAR</button>
      </div>
    </div>


    <div class="esquerda">
      <div class="conteudo-esquerda">
        <h1>BarbTech</h1>
        <p>Cadastre-se e faça seus agendamentos</p>
      </div>
    </div>

  </div>
</div>
