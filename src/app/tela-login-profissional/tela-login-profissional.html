<div class="div tela">
<div class="container">
    <div class="esquerda">
        <div class="texto">
        <h1>BarbTech</h1>
        <p>A excelência da barbearia clássica impulsionada pela precisão tecnológica</p>
        </div>
    </div>
    <div class="direita">
        <div class="titulo">
    <h1>Bem-vindo de volta</h1>
    <p  class="paragrafo">Acesse sua conta para gerenciar seus agendamentos.</p>
    </div>
    <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" class="form-control" id="email" name="email" [(ngModel)]="email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <div class="senha-linha">
    <label for="password">Password:</label>
    <a href="#" class="senha">Esqueci minha senha</a>
  </div>
  <input type="password" class="form-control" id="password" name="password" [(ngModel)]="password" placeholder="Senha">
    </div>
    <div class="checkbox">
      <label><input type="checkbox" class="checkbox-custom"> Lembrar de mim</label>
    </div>
    <p *ngIf="errorMessage" style="color: red; margin-bottom: 10px;">{{errorMessage}}</p>
    <button type="submit" class="btn-primary">ENTRAR NO ATELIER</button>
    </form>
    <div class="registrar">
        <p class="texto-registro">Não tem uma conta? <button class="botao-registro" routerLink="/cadastro-profissional" routerLinkActive="active">Criar nova conta</button></p>
    </div>
    </div>
</div>
</div>
