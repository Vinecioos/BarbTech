<app-header></app-header>

<main class="lista-container">
  <h2 class="lista-titulo">
    {{ servicoFiltro ? 'Barbeiros para: ' + servicoFiltro : 'Barbeiros' }}
  </h2>

  <div class="lista">
    <div class="card" *ngFor="let barbeiro of barbeiros" routerLink="/agendamento/{{barbeiro.id}}">
      <div class="card__avatar">{{ barbeiro.nome.charAt(0) }}</div>
      <div class="card__info">
        <h3 class="card__nome">{{ barbeiro.nome }}</h3>
        <p class="card__especialidade">{{ barbeiro.especialidade }}</p>
      </div>
      <span class="card__avaliacao">⭐ {{ barbeiro.avaliacao }}</span>
    </div>

    <p class="lista-vazia" *ngIf="barbeiros.length === 0">
      Nenhum barbeiro encontrado para este serviço.
    </p>
  </div>
</main>

<app-rodape></app-rodape>
